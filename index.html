<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbor Web Lab | Digital Portfolio</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs (to run JSX in browser) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050a10; }
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Simple Icon Component for CDN version
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const ProjectSlideshow = ({ desktopImages, mobileImages, color }) => {
            const [index, setIndex] = useState(0);

            useEffect(() => {
                const timer = setInterval(() => {
                    setIndex((prev) => (prev + 1) % desktopImages.length);
                }, 4000);
                return () => clearInterval(timer);
            }, [desktopImages.length]);

            return (
                <div className="relative w-full h-[400px] lg:h-[500px] group">
                    <div className="absolute top-0 left-0 w-[85%] lg:w-[80%] z-10 transition-all duration-700 transform group-hover:-translate-y-2">
                        <div className="bg-[#1a1f2e] rounded-2xl overflow-hidden shadow-2xl border border-white/10">
                            <div className="bg-[#242938] px-4 py-2 border-b border-white/5 flex items-center gap-2">
                                <div className="flex gap-1.5">
                                    <div className="w-2 h-2 rounded-full bg-red-500/30"></div>
                                    <div className="w-2 h-2 rounded-full bg-amber-500/30"></div>
                                    <div className="w-2 h-2 rounded-full bg-emerald-500/30"></div>
                                </div>
                                <div className="mx-auto bg-slate-900/50 px-3 py-1 rounded-md text-[9px] text-slate-500 font-mono tracking-tighter uppercase">
                                    HTTPS://ARBORWEBLAB.COM/PREVIEW
                                </div>
                            </div>
                            <div className="aspect-video relative overflow-hidden bg-slate-800">
                                {desktopImages.map((img, i) => (
                                    <img
                                        key={i}
                                        src={img}
                                        className={`absolute inset-0 w-full h-full object-cover object-top transition-opacity duration-1000 ${i === index ? 'opacity-100' : 'opacity-0'}`}
                                    />
                                ))}
                                <div className={`absolute inset-0 bg-gradient-to-br ${color} opacity-10`}></div>
                            </div>
                        </div>
                    </div>

                    <div className="absolute bottom-0 right-0 w-[32%] lg:w-[28%] z-20 transition-all duration-700 transform group-hover:translate-x-2 group-hover:translate-y-1">
                        <div className="relative bg-[#0a0f1a] rounded-[2.5rem] p-1.5 shadow-2xl border-[4px] border-[#242938]">
                            <div className="absolute top-3 left-1/2 -translate-x-1/2 w-12 h-3 bg-[#0a0f1a] rounded-full z-30"></div>
                            <div className="aspect-[9/19] relative rounded-[2rem] overflow-hidden bg-slate-900">
                                {mobileImages.map((img, i) => (
                                    <img
                                        key={i}
                                        src={img}
                                        className={`absolute inset-0 w-full h-full object-cover object-top transition-opacity duration-1000 ${i === index ? 'opacity-100' : 'opacity-0'}`}
                                    />
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className={`absolute -inset-4 blur-[80px] opacity-10 bg-gradient-to-r ${color} rounded-full -z-10`}></div>
                </div>
            );
        };

        const App = () => {
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => setIsVisible(true), []);

            const featuredProjects = [
                {
                    title: "Cruisy Travel",
                    category: "Travel Affiliate Ecosystem",
                    description: "A tropical, high-conversion affiliate platform featuring a suite of custom-built travel applications including the Cruise Explorer, Cruise Matchmaker, and Trip Planner. We engineer these high-utility tools to help travel brands turn standard traffic into a loyal, high-conversion audience.",
                    desktopImages: [
                        "https://arborweblab.com/wp-content/uploads/2026/02/Cruisy-Travel-Website-Screenshot-Home-.png",
                        "https://arborweblab.com/wp-content/uploads/2026/02/Cruisy-Travel-Key-West-Page.png"
                    ],
                    mobileImages: [
                        "https://arborweblab.com/wp-content/uploads/2026/02/Screenshot_20260224-113836-scaled-e1771952433142.png",
                        "https://arborweblab.com/wp-content/uploads/2026/02/Screenshot_20260224-120204-scaled.png"
                    ],
                    tags: ["Cruise Explorer", "Trip Planner", "Cruise Matchmaker"],
                    url: "https://cruisytravel.com",
                    color: "from-cyan-500 to-emerald-500"
                },
                {
                    title: "Sandbar Finder",
                    category: "Travel Application",
                    description: "A specialized exploration app developed for the Cruisy Travel network. This high-utility tool demonstrates our ability to create localized niche apps—like the Sandbar Finder—which dominate micro-markets by providing interactive value to users. We can deploy this exact architecture for any travel business.",
                    desktopImages: [
                        "https://arborweblab.com/wp-content/uploads/2026/02/Sandbar-Finder-Home-Screen-Screenshot.png",
                        "https://arborweblab.com/wp-content/uploads/2026/02/Sandbar-Finder-Amazon-Travel-Essentials-Screenshot.png"
                    ],
                    mobileImages: [
                        "https://arborweblab.com/wp-content/uploads/2026/02/Screenshot_20260224-114847.png",
                        "https://arborweblab.com/wp-content/uploads/2026/02/Screenshot_20260224-113917-scaled-e1771952813333.png"
                    ],
                    tags: ["Niche Exploration", "Map Integration", "Custom Build"],
                    url: "https://cruisytravel.com",
                    color: "from-emerald-400 to-teal-600"
                }
            ];

            const pastProjects = ["One Source Electric", "Lotus Lactation", "Magickal Crafts", "Wandering Washenaw", "MidWest Laser Dentistry", "Avalon Park Jewelers", "Orlando Gold Buyers", "Step Out Tampa Bay", "Moon Devs", "Wave & Web", "Passport Weekly", "Tempo Restaurant & Bar"];

            return (
                <div className="min-h-screen text-slate-200 selection:bg-emerald-500/30 overflow-x-hidden">
                    <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
                        <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-emerald-600/20 blur-[120px] rounded-full animate-pulse"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-cyan-600/10 blur-[120px] rounded-full"></div>
                    </div>

                    <header className="relative z-50 py-8 px-6 lg:px-12 border-b border-white/5 backdrop-blur-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-emerald-400 to-teal-600 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                                    <Icon name="layers" className="text-white" />
                                </div>
                                <div className="leading-none">
                                    <span className="block text-lg font-black tracking-tighter text-white uppercase">Arbor Web Lab</span>
                                    <span className="text-[10px] font-bold text-emerald-500 tracking-[0.2em] uppercase">Specialized Solutions</span>
                                </div>
                            </div>
                            <a href="https://arborweblab.com" className="group flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white transition-all uppercase tracking-widest bg-white/5 px-4 py-2 rounded-full border border-white/10">
                                Main Site <Icon name="arrow-up-right" size={14} />
                            </a>
                        </div>
                    </header>

                    <section className="relative z-10 pt-20 pb-32 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className={`transition-all duration-1000 transform ${isVisible ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
                                <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-bold uppercase tracking-widest mb-8">
                                    <Icon name="sparkles" size={12} /> Custom Travel App Deployments
                                </div>
                                <h1 className="text-6xl lg:text-9xl font-black tracking-tighter text-white mb-8 leading-[0.85] uppercase">
                                    Digital <br />
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-cyan-400 to-emerald-600">Experience</span> <br />
                                    Archive.
                                </h1>
                                <p className="max-w-2xl text-xl text-slate-400 leading-relaxed font-medium">
                                    Specialized high-performance travel apps and custom niche portals. We build the tools that turn travelers into customers.
                                </p>
                            </div>
                        </div>
                    </section>

                    <section className="relative z-10 py-20 px-6">
                        <div className="max-w-7xl mx-auto space-y-48">
                            {featuredProjects.map((project, idx) => (
                                <div key={idx} className={`flex flex-col lg:flex-row gap-16 lg:gap-24 items-center group ${idx % 2 !== 0 ? 'lg:flex-row-reverse' : ''}`}>
                                    <div className="w-full lg:w-3/5">
                                        <ProjectSlideshow desktopImages={project.desktopImages} mobileImages={project.mobileImages} color={project.color} />
                                    </div>
                                    <div className="w-full lg:w-2/5 space-y-8">
                                        <div className="space-y-4">
                                            <span className={`text-xs font-black uppercase tracking-[0.3em] bg-clip-text text-transparent bg-gradient-to-r ${project.color}`}>{project.category}</span>
                                            <h3 className="text-4xl lg:text-6xl font-black text-white leading-tight uppercase">{project.title}</h3>
                                        </div>
                                        <p className="text-lg text-slate-400 leading-relaxed">{project.description}</p>
                                        <div className="flex flex-wrap gap-2">
                                            {project.tags.map(tag => (
                                                <span key={tag} className="px-3 py-1.5 rounded-lg bg-white/5 border border-white/10 text-[10px] font-bold text-slate-400 uppercase tracking-widest">{tag}</span>
                                            ))}
                                        </div>
                                        <div className="pt-4">
                                            <a href={project.url} target="_blank" className="inline-flex items-center gap-3 px-8 py-4 bg-white text-slate-950 font-black rounded-xl hover:bg-emerald-500 hover:text-white transition-all transform hover:-translate-y-1 w-full sm:w-auto justify-center">
                                                VIEW PROJECT <Icon name="external-link" size={18} />
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section className="py-32 relative overflow-hidden">
                        <div className="absolute inset-0 bg-emerald-500/5 -skew-y-3"></div>
                        <div className="max-w-7xl mx-auto px-6 relative z-10">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
                                <div className="space-y-4 text-center md:text-left">
                                    <h2 className="text-4xl lg:text-6xl font-black text-white tracking-tighter uppercase">Deployment Log</h2>
                                    <p className="text-slate-500 font-bold uppercase tracking-widest text-sm">A brief history of our craftsmanship</p>
                                </div>
                                <div className="bg-emerald-500/10 border border-emerald-500/20 p-6 rounded-2xl backdrop-blur-md w-full md:w-auto text-center">
                                    <div className="text-4xl font-black text-emerald-500">2500+</div>
                                    <div className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Projects Shipped</div>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {pastProjects.map((name, i) => (
                                    <div key={i} className="group p-6 rounded-2xl border border-white/5 bg-white/[0.02] hover:bg-emerald-500/10 hover:border-emerald-500/30 transition-all duration-500">
                                        <span className="text-slate-500 group-hover:text-emerald-400 font-mono text-[9px] block mb-2 uppercase tracking-tighter">ID: AWL-0{i+1}</span>
                                        <span className="text-slate-300 group-hover:text-white font-bold tracking-tight text-xs uppercase">{name}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="contact" className="py-40 px-6 relative">
                        <div className="max-w-4xl mx-auto text-center space-y-12">
                            <div className="relative inline-block">
                                <h2 className="text-6xl lg:text-8xl font-black text-white tracking-tighter leading-none uppercase">
                                    Start Your <br />
                                    <span className="text-emerald-500 font-black">Own Build</span>
                                </h2>
                                <div className="absolute -right-8 -top-8 w-16 h-16 border-t-2 border-r-2 border-emerald-500/50"></div>
                                <div className="absolute -left-8 -bottom-8 w-16 h-16 border-b-2 border-l-2 border-emerald-500/50"></div>
                            </div>
                            <p className="text-xl text-slate-400 max-w-xl mx-auto font-medium">
                                Ready for a custom Cruise Explorer, Trip Planner, or Niche Exploration app? We create specialized tools for any travel business looking to offer more value.
                            </p>
                            <div className="flex flex-col sm:flex-row gap-6 justify-center items-center">
                                <a href="mailto:hello@arborweblab.com" className="w-full sm:w-auto px-12 py-6 bg-emerald-600 text-white font-black text-xl rounded-2xl hover:bg-emerald-500 transition-all shadow-2xl shadow-emerald-500/30 uppercase tracking-tighter">
                                    Get an Estimate
                                </a>
                                <div className="text-slate-500 font-mono text-[10px] uppercase tracking-[0.3em] flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                    Active for Booking
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 border-t border-white/5 bg-black/50 backdrop-blur-xl">
                        <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8 text-[10px] font-bold text-slate-600 uppercase tracking-widest">
                            <div className="flex items-center gap-4">
                                <div className="w-8 h-8 border border-white/20 rounded-lg flex items-center justify-center">AWL</div>
                                <span>© 2026 Arbor Web Lab</span>
                            </div>
                            <a href="https://arborweblab.com" className="hover:text-emerald-500 transition-colors underline decoration-slate-800 underline-offset-4 decoration-2">CORE SYSTEMS</a>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
